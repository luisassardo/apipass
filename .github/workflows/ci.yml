name: CI

# Build-and-syntax checks on every push/PR. No secrets, no signing —
# this catches breakage early; signed/notarized releases are cut locally.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Frontend JS syntax check
        run: for f in frontend/*.js; do echo "checking $f"; node --check "$f"; done

      - name: Build Argon2 bundle
        run: npm run build:argon2

      - name: Verify vendored argon2.js is up to date
        run: git diff --exit-code frontend/argon2.js || (echo "argon2.js is stale — run 'npm run build:argon2' and commit" && exit 1)

      - name: Assemble site (sanity)
        run: npm run build:site

      - name: Rust compile check
        run: cargo build --manifest-path src-tauri/Cargo.toml
